name: 福彩3D自动分析

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装系统依赖库
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype6-dev libpng-dev fonts-wqy-microhei
    
    - name: 安装Python依赖库
      run: |
        pip install --upgrade pip
        pip install pandas numpy matplotlib requests beautifulsoup4 openpyxl lxml
    
    - name: 运行分析程序
      run: python 福彩3D顶尖分析系统.py
    
    - name: 部署到GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        keep_files: false
