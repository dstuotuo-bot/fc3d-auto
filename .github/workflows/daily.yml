name: 福彩3D自动分析

on:
  schedule:
    - cron: '50 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装系统依赖库
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype6-dev libpng-dev fonts-wqy-microhei
    
    - name: 安装Python依赖库
      run: |
        pip install --upgrade pip
        pip install pandas numpy matplotlib requests beautifulsoup4 openpyxl lxml
    
    - name: 运行分析程序
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python 福彩3D顶尖分析系统.py
    
    - name: 提交数据文件到仓库
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add fc3d_data.xlsx fc3d_report.html fc3d_*.png
        git commit -m "auto: 更新开奖数据 $(date '+%Y-%m-%d %H:%M:%S')" || echo "无变化"
        git push
