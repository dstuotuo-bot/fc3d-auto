name: 福彩3D自动分析

on:
  schedule:
    - cron: '50 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装系统依赖库
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype6-dev libpng-dev fonts-wqy-microhei
    
    - name: 安装Python依赖库
      run: |
        pip install --upgrade pip
        pip install pandas numpy matplotlib requests beautifulsoup4 openpyxl lxml
    
    - name: 抓取最新数据
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python << 'EOF'
import requests
import pandas as pd
from bs4 import BeautifulSoup
from datetime import datetime

def fetch_data():
    """抓取福彩3D历史数据"""
    all_data = []
    headers = {'User-Agent': 'Mozilla/5.0'}
    
    # 尝试多个数据源
    urls = [
        'https://www.500.com/cp/fc3d/kaijiang/',
        'http://kaijiang.zhcw.com/zhcw/html/3d/list_1.html'
    ]
    
    for url in urls:
        try:
            r = requests.get(url, headers=headers, timeout=15)
            if r.status_code != 200:
                continue
            soup = BeautifulSoup(r.text, 'html.parser')
            rows = soup.find_all('tr')
            
            for row in rows[2:22]:
                cols = row.find_all('td')
                if len(cols) >= 3:
                    period = cols[1].text.strip()
                    date = cols[0].text.strip()
                    em = row.find_all('em')
                    if len(em) >= 3:
                        nums = f"{em[0].text.strip()}{em[1].text.strip()}{em[2].text.strip()}"
                        all_data.append({'期号': period, '开奖日期': date, '开奖号码': nums})
            
            if all_data:
                print(f"成功抓取 {len(all_data)} 期数据")
                break
        except Exception as e:
            print(f"抓取失败: {e}")
            continue
    
    if not all_data:
        # 备用数据（使用DeepSeek API获取）
        print("使用DeepSeek API获取数据...")
        api_key = "${{ secrets.DEEPSEEK_API_KEY }}"
        if api_key and api_key != "":
            try:
                response = requests.post(
                    'https://api.deepseek.com/v1/chat/completions',
                    headers={'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'},
                    json={
                        'model': 'deepseek-chat',
                        'messages': [{'role': 'user', 'content': '请返回福彩3D最近3期的开奖结果，格式：期号,开奖日期,开奖号码'}],
                        'temperature': 0,
                        'max_tokens': 200
                    },
                    timeout=30
                )
                if response.status_code == 200:
                    result = response.json()
                    print(f"API返回: {result}")
            except:
                pass
    
    return all_data

if __name__ == "__main__":
    data = fetch_data()
    if data:
        df = pd.DataFrame(data)
        df.to_excel('fc3d_data.xlsx', index=False)
        print(f"数据已保存，共 {len(df)} 期")
    else:
        print("抓取失败，使用现有数据")
EOF
    
    - name: 运行分析程序
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python 福彩3D顶尖分析系统.py
    
    - name: 提交文件到仓库
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add fc3d_data.xlsx fc3d_report.html fc3d_*.png
        git commit -m "auto: 更新开奖数据 $(date '+%Y-%m-%d %H:%M:%S')" || echo "无变化"
        git push
